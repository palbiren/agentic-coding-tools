# agents.yaml — Single source of truth for agent identity and permissions.
# Referenced by profile_loader and setup-coordinator skill.
#
# The optional `cli` section configures vendor dispatch for multi-vendor
# review orchestration.  Only agents with a `cli` section can be targets
# for CLI subprocess dispatch (review, alternative plan/impl).

agents:
  claude-code-local:
    type: claude_code
    profile: claude_code_cli
    trust_level: 3
    transport: mcp
    isolation: worktree
    capabilities: [lock, queue, memory, guardrails, handoff, discover, audit]
    description: Local Claude Code CLI agent with full coordination access
    cli:
      command: claude
      dispatch_modes:
        review:
          args: ["--print", "--allowedTools", "Read,Grep,Glob"]
        alternative_plan:
          args: ["--print", "--allowedTools", "Read,Grep,Glob,Write,Edit"]
        alternative_impl:
          args: ["--print", "--allowedTools", "Read,Grep,Glob,Write,Edit,Bash"]
      model_flag: "--model"
      model: null
      model_fallbacks: ["claude-sonnet-4-6"]


  claude-code-web:
    type: claude_code
    profile: claude_code_web_implementer
    trust_level: 2
    transport: http
    isolation: none
    api_key: "${CLAUDE_WEB_API_KEY}"
    openbao_role_id: claude-code-web
    capabilities: [lock, queue, memory, guardrails, handoff, discover]
    description: Claude Code web agent for cloud-based implementation

  codex-local:
    type: codex
    profile: codex_local_worker
    trust_level: 3
    transport: mcp
    isolation: worktree
    capabilities: [lock, queue, memory, guardrails, handoff, discover, audit]
    description: Local Codex worker with full coordination access
    cli:
      command: codex
      dispatch_modes:
        review:
          args: ["exec", "-s", "read-only"]
        alternative_plan:
          args: ["exec", "-s", "workspace-write"]
        alternative_impl:
          args: ["exec", "-s", "workspace-write"]
      model_flag: "-m"
      model: null
      model_fallbacks: ["o3", "gpt-4.1"]

  codex-cloud:
    type: codex
    profile: codex_cloud_worker
    trust_level: 2
    transport: http
    isolation: sandbox
    api_key: "${CODEX_API_KEY}"
    openbao_role_id: codex-cloud
    capabilities: [lock, queue, memory, guardrails]
    description: Codex cloud worker for parallel task execution

  gemini-local:
    type: gemini
    profile: gemini_local_worker
    trust_level: 3
    transport: mcp
    isolation: worktree
    capabilities: [lock, queue, memory, guardrails, handoff, discover, audit]
    description: Local Gemini worker with full coordination access
    cli:
      command: gemini
      dispatch_modes:
        review:
          args: ["--approval-mode", "default", "-o", "json"]
        alternative_plan:
          args: ["--approval-mode", "auto_edit", "-o", "json"]
        alternative_impl:
          args: ["--approval-mode", "yolo"]
      model_flag: "-m"
      model: null
      model_fallbacks: ["gemini-2.5-pro", "gemini-2.5-flash"]


  gemini-cloud:
    type: gemini
    profile: gemini_cloud_worker
    trust_level: 2
    transport: http
    isolation: none
    api_key: "${GEMINI_API_KEY}"
    openbao_role_id: gemini-cloud
    capabilities: [lock, queue, memory]
    description: Gemini cloud agent for parallel task execution

# agents.yaml — Single source of truth for agent identity and permissions.
# Referenced by profile_loader and setup-coordinator skill.
#
# Naming convention: <vendor>-<local|remote>
#   local  = CLI runs on the developer's machine
#   remote = CLI dispatches to vendor's cloud infrastructure
#
# The optional `cli` section configures vendor dispatch for multi-vendor
# review orchestration.  Only agents with a `cli` section can be targets
# for CLI subprocess dispatch (review or alternative generation).
# The review_type (plan vs implementation) determines what is being
# reviewed/generated; the dispatch mode controls sandbox permissions.
#
# Agents without a `cli` section (e.g., gemini-remote) require direct
# API dispatch — a future transport not yet implemented.

agents:
  # ---------------------------------------------------------------------------
  # Claude Code
  # ---------------------------------------------------------------------------

  claude-local:
    type: claude_code
    profile: claude_code_cli
    trust_level: 3
    transport: mcp
    isolation: worktree
    capabilities: [lock, queue, memory, guardrails, handoff, discover, audit]
    description: Local Claude Code CLI agent with full coordination access
    cli:
      command: claude
      dispatch_modes:
        review:
          args: ["--print", "--allowedTools", "Read,Grep,Glob"]
        alternative:
          args: ["--print", "--allowedTools", "Read,Grep,Glob,Write,Edit,Bash"]
      model_flag: "--model"
      model: null
      model_fallbacks: ["claude-sonnet-4-6"]
      prompt_via_stdin: true

  claude-remote:
    type: claude_code
    profile: claude_code_web_implementer
    trust_level: 2
    transport: http
    isolation: none
    api_key: "${CLAUDE_WEB_API_KEY}"
    openbao_role_id: claude-code-web
    capabilities: [lock, queue, memory, guardrails, handoff, discover]
    description: Remote Claude Code agent (runs on Anthropic infrastructure)
    cli:
      command: claude
      dispatch_modes:
        review:
          args: ["--print", "--remote", "--allowedTools", "Read,Grep,Glob"]
        alternative:
          args: ["--print", "--remote", "--allowedTools", "Read,Grep,Glob,Write,Edit,Bash"]
      model_flag: "--model"
      model: null
      model_fallbacks: ["claude-sonnet-4-6"]
      prompt_via_stdin: true

  # ---------------------------------------------------------------------------
  # Codex
  # ---------------------------------------------------------------------------

  codex-local:
    type: codex
    profile: codex_local_worker
    trust_level: 3
    transport: mcp
    isolation: worktree
    capabilities: [lock, queue, memory, guardrails, handoff, discover, audit]
    description: Local Codex worker with full coordination access
    cli:
      command: codex
      dispatch_modes:
        review:
          args: ["exec", "-s", "read-only"]
        alternative:
          args: ["exec", "-s", "workspace-write"]
      model_flag: "-m"
      model: null
      model_fallbacks: ["o3", "gpt-4.1"]

  codex-remote:
    type: codex
    profile: codex_cloud_worker
    trust_level: 2
    transport: http
    isolation: sandbox
    api_key: "${CODEX_API_KEY}"
    openbao_role_id: codex-cloud
    capabilities: [lock, queue, memory, guardrails]
    description: Remote Codex agent (runs on OpenAI infrastructure)
    cli:
      command: codex
      dispatch_modes:
        review:
          # codex cloud exec requires --env; set CODEX_CLOUD_ENV in environment
          args: ["cloud", "exec", "--env", "${CODEX_CLOUD_ENV}"]
        alternative:
          args: ["cloud", "exec", "--env", "${CODEX_CLOUD_ENV}"]
      model_flag: "-m"
      model: null
      model_fallbacks: ["o3", "gpt-4.1"]

  # ---------------------------------------------------------------------------
  # Gemini
  # ---------------------------------------------------------------------------

  gemini-local:
    type: gemini
    profile: gemini_local_worker
    trust_level: 3
    transport: mcp
    isolation: worktree
    capabilities: [lock, queue, memory, guardrails, handoff, discover, audit]
    description: Local Gemini worker with full coordination access
    cli:
      command: gemini
      dispatch_modes:
        review:
          args: ["--approval-mode", "default", "-o", "json"]
        alternative:
          args: ["--approval-mode", "yolo"]
      model_flag: "-m"
      model: null
      model_fallbacks: ["gemini-2.5-pro", "gemini-2.5-flash"]

  gemini-remote:
    type: gemini
    profile: gemini_cloud_worker
    trust_level: 2
    transport: http
    isolation: none
    api_key: "${GEMINI_API_KEY}"
    openbao_role_id: gemini-cloud
    capabilities: [lock, queue, memory]
    description: Remote Gemini agent (no CLI dispatch — requires API transport, not yet implemented)
    # No `cli` section — Jules/Gemini has no remote CLI.
    # Will be dispatched via direct API transport when implemented.

# agents.yaml — Single source of truth for agent identity and permissions.
# Referenced by profile_loader and setup-coordinator skill.
#
# Naming convention: <vendor>-<local|remote>
#   local  = CLI runs on the developer's machine
#   remote = CLI dispatches to vendor's cloud infrastructure
#
# The optional `cli` section configures vendor dispatch for multi-vendor
# review orchestration.  Only agents with a `cli` section can be targets
# for CLI subprocess dispatch (review or alternative generation).
# The review_type (plan vs implementation) determines what is being
# reviewed/generated; the dispatch mode controls sandbox permissions.
#
# The optional `sdk` section configures SDK-based API dispatch as a
# fallback when the vendor's CLI is not installed.  API keys are resolved
# via OpenBao at runtime (using `openbao_role_id`), falling back to the
# environment variable named in `api_key_env`.
#
# The optional `archetypes` field declares which agent archetypes (defined in
# archetypes.yaml) this agent can fulfill. When set, the coordinator work
# queue filters claims by archetype compatibility — a task submitted with
# `agent_requirements.archetype = "architect"` will only be claimed by agents
# whose archetypes list includes "architect". Agents with no archetypes
# field (or an empty list) are backward-compatible and can claim any task.

agents:
  # ---------------------------------------------------------------------------
  # Claude Code
  # ---------------------------------------------------------------------------

  claude-local:
    type: claude_code
    profile: claude_code_local
    trust_level: 3
    transport: mcp
    isolation: worktree
    capabilities: [lock, queue, memory, guardrails, handoff, discover, audit]
    archetypes: [architect, analyst, implementer, reviewer, runner, documenter]
    description: Local Claude Code CLI agent with full coordination access
    cli:
      command: claude
      dispatch_modes:
        review:
          args: ["--print", "--allowedTools", "Read,Grep,Glob"]
        alternative:
          args: ["--print", "--allowedTools", "Read,Grep,Glob,Write,Edit,Bash"]
        quick:
          args: ["--print", "--allowedTools", "Read,Grep,Glob,Write,Edit,Bash"]
      model_flag: "--model"
      model: null
      model_fallbacks: ["claude-sonnet-4-6"]
      prompt_via_stdin: true

  claude-remote:
    type: claude_code
    profile: claude_code_remote
    trust_level: 2
    transport: http
    isolation: none
    api_key: "${CLAUDE_WEB_API_KEY}"
    openbao_role_id: claude-code-web
    capabilities: [lock, queue, memory, guardrails, handoff, discover]
    archetypes: [analyst, implementer, reviewer, documenter]
    description: Remote Claude Code agent (runs on Anthropic infrastructure)
    cli:
      command: claude
      dispatch_modes:
        review:
          # Sync: --print --remote blocks and returns stdout
          args: ["--print", "--remote", "--allowedTools", "Read,Grep,Glob"]
        alternative:
          # Async: --remote without --print returns immediately
          args: ["--remote"]
          async: true
          poll:
            # Poll via RemoteTrigger API or `claude --resume` (session-based)
            # For now, use `claude tasks` to check status
            command_template: ["claude", "--resume", "{task_id}", "--print"]
            task_id_pattern: "session[_\\s:]+([a-f0-9-]+)"
            success_pattern: "completed|finished|done"
            failure_pattern: "failed|error|cancelled"
            interval_seconds: 60
            timeout_seconds: 1800
        quick:
          args: ["--print", "--allowedTools", "Read,Grep,Glob,Write,Edit,Bash"]
      model_flag: "--model"
      model: null
      model_fallbacks: ["claude-sonnet-4-6"]
      prompt_via_stdin: true
    sdk:
      package: anthropic
      method: messages.create
      model: claude-sonnet-4-6
      model_fallbacks: [claude-haiku-4-5-20251001]
      api_key_env: ANTHROPIC_API_KEY
      max_tokens: 16384

  # ---------------------------------------------------------------------------
  # Codex
  # ---------------------------------------------------------------------------

  codex-local:
    type: codex
    profile: codex_local
    trust_level: 3
    transport: mcp
    isolation: worktree
    capabilities: [lock, queue, memory, guardrails, handoff, discover, audit]
    archetypes: [architect, analyst, implementer, reviewer, runner, documenter]
    description: Local Codex worker with full coordination access
    cli:
      command: codex
      dispatch_modes:
        review:
          args: ["exec", "-s", "read-only"]
        alternative:
          args: ["exec", "-s", "workspace-write"]
        quick:
          args: ["exec", "-s", "workspace-write"]
      model_flag: "-m"
      model: "gpt-5.5"
      model_fallbacks: ["gpt-5.4", "gpt-5.4-mini"]

  codex-remote:
    type: codex
    profile: codex_remote
    trust_level: 2
    transport: http
    isolation: sandbox
    api_key: "${CODEX_API_KEY}"
    openbao_role_id: codex-cloud
    capabilities: [lock, queue, memory, guardrails]
    archetypes: [implementer, reviewer]
    description: Remote Codex agent (runs on OpenAI infrastructure)
    cli:
      command: codex
      dispatch_modes:
        review:
          # codex cloud exec requires --env; set CODEX_CLOUD_ENV in environment
          # All cloud exec is async — submit + poll
          args: ["cloud", "exec", "--env", "${CODEX_CLOUD_ENV}"]
          async: true
          poll:
            command_template: ["codex", "cloud", "status", "{task_id}"]
            task_id_pattern: "task[_\\s:]+([\\w-]+)"
            success_pattern: "completed|succeeded"
            failure_pattern: "failed|cancelled|error"
            interval_seconds: 30
            timeout_seconds: 600
        alternative:
          args: ["cloud", "exec", "--env", "${CODEX_CLOUD_ENV}"]
          async: true
          poll:
            command_template: ["codex", "cloud", "status", "{task_id}"]
            task_id_pattern: "task[_\\s:]+([\\w-]+)"
            success_pattern: "completed|succeeded"
            failure_pattern: "failed|cancelled|error"
            interval_seconds: 30
            timeout_seconds: 1800
      model_flag: "-m"
      model: "gpt-5.4"
      model_fallbacks: ["gpt-5.3-codex"]
    sdk:
      package: openai
      method: chat.completions.create
      model: gpt-5.4
      model_fallbacks: [gpt-5.4-mini]
      api_key_env: OPENAI_API_KEY
      max_tokens: 16384

  # ---------------------------------------------------------------------------
  # Gemini
  # ---------------------------------------------------------------------------

  gemini-local:
    type: gemini
    profile: gemini_local
    trust_level: 3
    transport: mcp
    isolation: worktree
    capabilities: [lock, queue, memory, guardrails, handoff, discover, audit]
    archetypes: [analyst, implementer, reviewer, runner, documenter]
    description: Local Gemini worker with full coordination access
    cli:
      command: gemini
      dispatch_modes:
        review:
          # -p triggers headless mode; its value primes JSON output.
          # The full review prompt arrives via stdin (-p appends stdin).
          # -o text gives clean model output (no session envelope).
          args: ["-p", "Respond with ONLY valid JSON conforming to review-findings.schema.json. No markdown, no explanation, no code fences.", "--approval-mode", "default", "-o", "text"]
        alternative:
          args: ["-p", "", "--approval-mode", "yolo"]
        quick:
          args: ["-p", "", "--approval-mode", "yolo"]
      model_flag: "-m"
      model: "auto"
      model_fallbacks: ["flash"]
      prompt_via_stdin: true

  gemini-remote:
    type: gemini
    profile: gemini_remote
    trust_level: 2
    transport: http
    isolation: none
    api_key: "${GEMINI_API_KEY}"
    openbao_role_id: gemini-cloud
    capabilities: [lock, queue, memory]
    archetypes: [implementer, reviewer]
    description: Remote Gemini agent via Jules extension (async dispatch)
    cli:
      command: gemini
      dispatch_modes:
        review:
          # Jules dispatch: prompt instructs Gemini to use /jules
          # The prompt MUST start with "/jules " for the extension to activate
          args: ["--approval-mode", "default"]
          async: true
          poll:
            # Poll by asking Gemini for Jules task status
            command_template: ["gemini", "--approval-mode", "default", "/jules status {task_id}"]
            task_id_pattern: "task[_\\s:]+([a-zA-Z0-9_-]+)|console_link.*?/tasks/([a-zA-Z0-9_-]+)"
            success_pattern: "completed|finished|merged|done"
            failure_pattern: "failed|error|cancelled"
            interval_seconds: 60
            timeout_seconds: 1800
        alternative:
          args: ["--approval-mode", "default"]
          async: true
          poll:
            command_template: ["gemini", "--approval-mode", "default", "/jules status {task_id}"]
            task_id_pattern: "task[_\\s:]+([a-zA-Z0-9_-]+)|console_link.*?/tasks/([a-zA-Z0-9_-]+)"
            success_pattern: "completed|finished|merged|done"
            failure_pattern: "failed|error|cancelled"
            interval_seconds: 60
            timeout_seconds: 3600
      model_flag: "-m"
      model: "auto"
      model_fallbacks: ["flash"]
    sdk:
      package: google-generativeai
      method: generate_content
      model: gemini-2.5-pro
      model_fallbacks: [gemini-2.5-flash]
      api_key_env: GOOGLE_API_KEY
      max_tokens: 16384

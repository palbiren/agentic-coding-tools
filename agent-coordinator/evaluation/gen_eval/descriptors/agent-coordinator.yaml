    interfaces:
      - "mcp:acquire_lock"
      - "mcp:release_lock"
      - "mcp:check_locks"
      - "mcp:force_release_lock"
      - "mcp:remember"
      - "mcp:recall"
      - "mcp:update_working_memory"
      - "mcp:get_working_memory"
      - "mcp:submit_work"
      - "mcp:get_work"
      - "mcp:complete_work"
      - "mcp:cancel_work"
      - "mcp:list_work"
      - "mcp:check_guardrails"

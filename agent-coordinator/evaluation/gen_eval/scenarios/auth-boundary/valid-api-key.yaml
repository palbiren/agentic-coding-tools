id: "auth-valid-api-key"
name: "Request with valid API key succeeds"
description: "Make an authenticated request with a valid API key and verify the operation succeeds and audit trail records the identity"
category: "auth-boundary"
priority: 1
interfaces: ["http", "db"]
tags: ["auth", "api-key", "success"]

steps:
  - id: store_memory_with_key
    transport: http
    method: POST
    endpoint: /memory/store
    headers:
      X-API-Key: "{{ valid_api_key }}"
    body:
      event_type: "auth_test"
      summary: "testing valid API key authentication"
      agent_id: "agent-1"
      tags: ["auth-test"]
    expect:
      status: 200
      body:
        success: true

  - id: verify_audit_recorded
    transport: http
    method: GET
    endpoint: /audit?agent_id=agent-1&operation=memory_store&limit=1
    headers:
      X-API-Key: "{{ valid_api_key }}"
    expect:
      status: 200
      not_empty: true

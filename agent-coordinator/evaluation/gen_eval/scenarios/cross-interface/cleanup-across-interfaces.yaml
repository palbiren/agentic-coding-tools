id: "cross-cleanup-across-interfaces"
name: "Cleanup after partial failure across interfaces"
description: "Start a multi-step operation across interfaces, simulate a mid-flow failure, then verify that cleanup correctly removes stale state from all interfaces"
category: "cross-interface"
priority: 1
interfaces: ["http", "mcp", "cli", "db"]
tags: ["cross-interface", "cleanup", "partial-failure", "failure"]

steps:
  - id: http_acquire_lock
    transport: http
    method: POST
    endpoint: /locks/acquire
    body:
      file_path: "src/cleanup_cross.py"
      agent_id: "agent-1"
      reason: "cleanup cross-interface test"
    expect:
      status: 200
      body:
        success: true

  - id: mcp_store_memory
    transport: mcp
    tool: remember
    params:
      event_type: "cleanup_cross_test"
      summary: "work in progress before simulated failure"
      tags: ["cleanup-cross"]
    expect:
      body:
        success: true

  - id: http_submit_work
    transport: http
    method: POST
    endpoint: /work/submit
    body:
      task_type: "cleanup_cross_task"
      task_description: "task that will be orphaned"
    expect:
      status: 200
      body:
        success: true

  - id: cli_release_lock
    transport: cli
    command: "lock release --file-path src/cleanup_cross.py"
    expect:
      exit_code: 0

  - id: verify_lock_cleaned
    transport: db
    sql: "SELECT COUNT(*) as cnt FROM file_locks WHERE file_path = 'src/cleanup_cross.py'"
    expect:
      rows: 1
      row:
        cnt: 0

cleanup:
  - id: cleanup_release
    transport: http
    method: POST
    endpoint: /locks/release
    body:
      file_path: "src/cleanup_cross.py"
      agent_id: "agent-1"

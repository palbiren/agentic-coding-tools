id: "cross-lock-http-mcp-cli-db"
name: "Lock lifecycle across all four transports"
description: "Acquire lock via HTTP, verify via MCP, check via CLI, confirm in DB, then release via MCP and verify removal in DB"
category: "cross-interface"
priority: 1
interfaces: ["http", "mcp", "cli", "db"]
tags: ["cross-interface", "locks", "all-transports", "success"]

steps:
  - id: http_acquire
    transport: http
    method: POST
    endpoint: /locks/acquire
    body:
      file_path: "src/cross_all.py"
      agent_id: "agent-1"
      reason: "cross-transport lock test"
    expect:
      status: 200
      body:
        success: true

  - id: mcp_verify
    transport: mcp
    tool: check_locks
    params:
      file_paths: ["src/cross_all.py"]
    expect:
      body:
        locked: true

  - id: cli_verify
    transport: cli
    command: "lock status --file-path src/cross_all.py"
    expect:
      exit_code: 0

  - id: db_verify
    transport: db
    sql: "SELECT agent_id FROM file_locks WHERE file_path = 'src/cross_all.py'"
    expect:
      rows: 1
      row:
        agent_id: "agent-1"

  - id: mcp_release
    transport: mcp
    tool: release_lock
    params:
      file_path: "src/cross_all.py"
    expect:
      body:
        success: true

  - id: db_verify_released
    transport: db
    sql: "SELECT COUNT(*) as cnt FROM file_locks WHERE file_path = 'src/cross_all.py'"
    expect:
      rows: 1
      row:
        cnt: 0

cleanup:
  - id: cleanup_release
    transport: http
    method: POST
    endpoint: /locks/release
    body:
      file_path: "src/cross_all.py"
      agent_id: "agent-1"

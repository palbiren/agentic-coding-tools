id: "cross-state-mismatch-detection"
name: "Detect state mismatch between interface responses"
description: "Acquire a lock via HTTP, then query status via MCP and DB. If any interface shows inconsistent state, the system has a coherence bug"
category: "cross-interface"
priority: 1
interfaces: ["http", "mcp", "db"]
tags: ["cross-interface", "state-mismatch", "consistency", "failure"]

steps:
  - id: http_acquire
    transport: http
    method: POST
    endpoint: /locks/acquire
    body:
      file_path: "src/mismatch_test.py"
      agent_id: "agent-1"
      reason: "mismatch detection"
    expect:
      status: 200
      body:
        success: true

  - id: http_status_shows_locked
    transport: http
    method: GET
    endpoint: /locks/status/src/mismatch_test.py
    expect:
      status: 200
      body:
        locked: true
        agent_id: "agent-1"

  - id: mcp_shows_locked
    transport: mcp
    tool: check_locks
    params:
      file_paths: ["src/mismatch_test.py"]
    expect:
      body:
        locked: true

  - id: db_shows_locked
    transport: db
    sql: "SELECT agent_id FROM file_locks WHERE file_path = 'src/mismatch_test.py'"
    expect:
      rows: 1
      row:
        agent_id: "agent-1"

  - id: http_release
    transport: http
    method: POST
    endpoint: /locks/release
    body:
      file_path: "src/mismatch_test.py"
      agent_id: "agent-1"
    expect:
      status: 200

  - id: http_status_shows_unlocked
    transport: http
    method: GET
    endpoint: /locks/status/src/mismatch_test.py
    expect:
      status: 200
      body:
        locked: false

  - id: db_shows_unlocked
    transport: db
    sql: "SELECT COUNT(*) as cnt FROM file_locks WHERE file_path = 'src/mismatch_test.py'"
    expect:
      rows: 1
      row:
        cnt: 0

cleanup:
  - id: cleanup_release
    transport: http
    method: POST
    endpoint: /locks/release
    body:
      file_path: "src/mismatch_test.py"
      agent_id: "agent-1"

id: "feature-duplicate-register"
name: "Duplicate feature registration handling"
description: "Registering the same feature_id twice should be handled gracefully - either rejected or treated as an update"
category: "feature-registry"
priority: 2
interfaces: ["http"]
tags: ["feature-registry", "duplicate", "failure"]

steps:
  - id: first_registration
    transport: http
    method: POST
    endpoint: /features/register
    headers:
      X-API-Key: "test-key-agent1"
    body:
      feature_id: "feat-duplicate-test"
      resource_claims:
        - "src/locks.py"
      title: "First registration"
      agent_id: "agent-1"
      branch_name: "openspec/feat-duplicate-test"
    expect:
      status: 200
      body:
        success: true
        feature_id: "feat-duplicate-test"

  - id: duplicate_registration
    transport: http
    method: POST
    endpoint: /features/register
    headers:
      X-API-Key: "test-key-agent1"
    body:
      feature_id: "feat-duplicate-test"
      resource_claims:
        - "src/locks.py"
        - "src/memory.py"
      title: "Duplicate registration attempt"
      agent_id: "agent-1"
      branch_name: "openspec/feat-duplicate-test"
    expect:
      status_one_of: [200, 409]
      # If 200, action should indicate update/noop; if 409, conflict expected

  - id: verify_original_intact
    transport: http
    method: GET
    endpoint: /features/feat-duplicate-test
    headers:
      X-API-Key: "test-key-agent1"
    expect:
      status: 200
      body:
        feature_id: "feat-duplicate-test"

cleanup:
  - id: deregister_feature
    transport: http
    method: POST
    endpoint: /features/deregister
    headers:
      X-API-Key: "test-key-agent1"
    body:
      feature_id: "feat-duplicate-test"
      status: "cancelled"

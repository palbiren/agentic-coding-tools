id: "lock-acquire-release"
name: "Basic lock acquire and release"
description: "Acquire a file lock via HTTP, verify it exists in DB, then release it and confirm removal"
category: "lock-lifecycle"
priority: 1
interfaces: ["http", "db"]
tags: ["locks", "basic", "success"]

steps:
  - id: acquire_lock
    transport: http
    method: POST
    endpoint: /locks/acquire
    body:
      file_path: "src/main.py"
      agent_id: "agent-1"
      reason: "editing main module"
    expect:
      status: 200
      body:
        success: true
    capture:
      lock_id: "$.lock_id"

  - id: verify_lock_in_db
    transport: db
    sql: "SELECT agent_id, file_path FROM file_locks WHERE file_path = 'src/main.py'"
    expect:
      rows: 1
      row:
        agent_id: "agent-1"
        file_path: "src/main.py"

  - id: check_status_while_held
    transport: http
    method: GET
    endpoint: /locks/status/src/main.py
    expect:
      status: 200
      body:
        locked: true
        agent_id: "agent-1"

  - id: release_lock
    transport: http
    method: POST
    endpoint: /locks/release
    body:
      file_path: "src/main.py"
      agent_id: "agent-1"
    expect:
      status: 200
      body:
        success: true

  - id: verify_lock_removed
    transport: db
    sql: "SELECT COUNT(*) as cnt FROM file_locks WHERE file_path = 'src/main.py'"
    expect:
      rows: 1
      row:
        cnt: 0

  - id: check_status_after_release
    transport: http
    method: GET
    endpoint: /locks/status/src/main.py
    expect:
      status: 200
      body:
        locked: false

id: "lock-concurrent-contention"
name: "Multiple agents contend for same lock simultaneously"
description: "Three agents attempt to acquire the same lock in rapid succession. Exactly one should succeed, the others should get conflict errors, and no duplicate locks should exist"
category: "lock-lifecycle"
priority: 1
interfaces: ["http", "db"]
tags: ["locks", "concurrency", "contention", "edge"]

steps:
  - id: agent1_acquire
    transport: http
    method: POST
    endpoint: /locks/acquire
    body:
      file_path: "src/contention.py"
      agent_id: "agent-1"
      reason: "concurrent contention test"
    expect:
      status: 200
      body:
        success: true

  - id: agent2_acquire_conflict
    transport: http
    method: POST
    endpoint: /locks/acquire
    body:
      file_path: "src/contention.py"
      agent_id: "agent-2"
      reason: "concurrent contention test"
    expect:
      status: 409
      body:
        success: false

  - id: agent3_acquire_conflict
    transport: http
    method: POST
    endpoint: /locks/acquire
    body:
      file_path: "src/contention.py"
      agent_id: "agent-3"
      reason: "concurrent contention test"
    expect:
      status: 409
      body:
        success: false

  - id: verify_exactly_one_lock
    transport: db
    sql: "SELECT COUNT(*) as cnt FROM file_locks WHERE file_path = 'src/contention.py'"
    expect:
      rows: 1
      row:
        cnt: 1

  - id: verify_correct_holder
    transport: db
    sql: "SELECT agent_id FROM file_locks WHERE file_path = 'src/contention.py'"
    expect:
      rows: 1
      row:
        agent_id: "agent-1"

cleanup:
  - id: cleanup_release
    transport: http
    method: POST
    endpoint: /locks/release
    body:
      file_path: "src/contention.py"
      agent_id: "agent-1"

id: "lock-release-not-held"
name: "Release a lock that is not held"
description: "Agent tries to release a lock on a file it does not hold. Should fail gracefully with appropriate error"
category: "lock-lifecycle"
priority: 2
interfaces: ["http"]
tags: ["locks", "release", "failure"]

steps:
  - id: verify_no_lock_exists
    transport: http
    method: GET
    endpoint: /locks/status/src/not_held.py
    expect:
      status: 200
      body:
        locked: false

  - id: release_unheld_lock
    transport: http
    method: POST
    endpoint: /locks/release
    body:
      file_path: "src/not_held.py"
      agent_id: "agent-1"
    expect:
      status: 404
      body:
        success: false

  - id: release_wrong_agent
    transport: http
    method: POST
    endpoint: /locks/acquire
    body:
      file_path: "src/not_held.py"
      agent_id: "agent-2"
      reason: "setup for wrong-agent release"
    expect:
      status: 200
      body:
        success: true

  - id: wrong_agent_release
    transport: http
    method: POST
    endpoint: /locks/release
    body:
      file_path: "src/not_held.py"
      agent_id: "agent-1"
    expect:
      status: 403
      body:
        success: false

cleanup:
  - id: cleanup_release
    transport: http
    method: POST
    endpoint: /locks/release
    body:
      file_path: "src/not_held.py"
      agent_id: "agent-2"

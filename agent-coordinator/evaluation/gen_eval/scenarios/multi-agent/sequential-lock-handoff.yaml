id: "multi-sequential-lock-handoff"
name: "Sequential lock handoff between agents"
description: "Agent-1 acquires a lock, does work, releases it, then agent-2 acquires the same lock. Verifies clean handoff with no stale state"
category: "multi-agent"
priority: 1
interfaces: ["http", "db"]
tags: ["multi-agent", "locks", "handoff", "success"]

steps:
  - id: agent1_acquire
    transport: http
    method: POST
    endpoint: /locks/acquire
    body:
      file_path: "src/handoff.py"
      agent_id: "agent-1"
      reason: "first agent working"
    expect:
      status: 200
      body:
        success: true

  - id: agent1_writes_handoff
    transport: http
    method: POST
    endpoint: /handoffs/write
    body:
      from_agent: "agent-1"
      to_agent: "agent-2"
      context: "Finished refactoring handoff.py, ready for review"
    expect:
      status: 200
      body:
        success: true

  - id: agent1_release
    transport: http
    method: POST
    endpoint: /locks/release
    body:
      file_path: "src/handoff.py"
      agent_id: "agent-1"
    expect:
      status: 200
      body:
        success: true

  - id: agent2_reads_handoff
    transport: http
    method: POST
    endpoint: /handoffs/read
    body:
      agent_id: "agent-2"
      limit: 1
    expect:
      status: 200
      not_empty: true

  - id: agent2_acquire
    transport: http
    method: POST
    endpoint: /locks/acquire
    body:
      file_path: "src/handoff.py"
      agent_id: "agent-2"
      reason: "reviewing after handoff"
    expect:
      status: 200
      body:
        success: true

  - id: verify_agent2_holds_lock
    transport: db
    sql: "SELECT agent_id FROM file_locks WHERE file_path = 'src/handoff.py'"
    expect:
      rows: 1
      row:
        agent_id: "agent-2"

cleanup:
  - id: cleanup_release
    transport: http
    method: POST
    endpoint: /locks/release
    body:
      file_path: "src/handoff.py"
      agent_id: "agent-2"

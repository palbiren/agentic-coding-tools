id: "multi-stale-lock-conflict"
name: "Agent encounters stale lock from crashed agent"
description: "Agent-1 acquires a lock but simulates a crash (never releases). After TTL expires, agent-2 should be able to acquire. Verifies stale lock detection and recovery"
category: "multi-agent"
priority: 1
interfaces: ["http", "db"]
tags: ["multi-agent", "locks", "stale", "crash-recovery", "failure"]

steps:
  - id: agent1_acquire
    transport: http
    method: POST
    endpoint: /locks/acquire
    body:
      file_path: "src/stale_lock.py"
      agent_id: "agent-crashed"
      reason: "will simulate crash"
    expect:
      status: 200
      body:
        success: true

  - id: agent2_immediate_acquire_fails
    transport: http
    method: POST
    endpoint: /locks/acquire
    body:
      file_path: "src/stale_lock.py"
      agent_id: "agent-2"
      reason: "trying before TTL"
    expect:
      status: 409
      body:
        success: false

  - id: wait_for_ttl
    transport: wait
    seconds: 3.0

  - id: agent2_acquire_after_ttl
    transport: http
    method: POST
    endpoint: /locks/acquire
    body:
      file_path: "src/stale_lock.py"
      agent_id: "agent-2"
      reason: "acquiring stale lock after TTL"
    expect:
      status: 200
      body:
        success: true

  - id: verify_new_holder
    transport: db
    sql: "SELECT agent_id FROM file_locks WHERE file_path = 'src/stale_lock.py'"
    expect:
      rows: 1
      row:
        agent_id: "agent-2"

cleanup:
  - id: cleanup_release
    transport: http
    method: POST
    endpoint: /locks/release
    body:
      file_path: "src/stale_lock.py"
      agent_id: "agent-2"

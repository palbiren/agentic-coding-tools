          cwd: "agent-coordinator"
          evidence:
            artifacts: []
            result_keys:
              - "existing_tests_pass"
    outputs:
      result_keys:
        - "queue_claim_histogram"
        - "queue_wait_histogram"
        - "queue_task_histogram"

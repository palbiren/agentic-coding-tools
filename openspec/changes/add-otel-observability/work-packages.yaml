  # === PARALLEL: Policy metrics ===
  - package_id: wp-policy-metrics
    title: "Policy evaluation metrics instrumentation"
    task_type: implement
    description: |
      Instrument PolicyEngine and GuardrailsService with OTel metrics and traces.
      1. Import meters from telemetry module
      2. Add policy.evaluate.duration_ms histogram to both NativePolicyEngine and CedarPolicyEngine
      3. Add policy.decision.total counter (allow/deny by engine and operation)
      4. Add policy.cache.total counter for Cedar cache hits/misses
      5. Add guardrail.check.duration_ms histogram
      6. Add guardrail.violation.total counter by pattern and severity
      7. Add tracing spans to policy evaluate and guardrail check
      8. Write unit tests with in-memory exporter
    role: backend
    priority: 3
    depends_on:
      - wp-otel-core
    locks:
      files:
        - "agent-coordinator/src/policy_engine.py"
        - "agent-coordinator/src/guardrails.py"
      keys:
        - "feature:add-otel-observability:policy"
      ttl_minutes: 120
      reason: "Policy and guardrails OTel instrumentation"
    scope:
      write_allow:
        - "agent-coordinator/src/policy_engine.py"
        - "agent-coordinator/src/guardrails.py"
        - "agent-coordinator/tests/test_policy_metrics.py"
      read_allow:
        - "agent-coordinator/src/**"
        - "openspec/changes/add-otel-observability/**"
      deny:
        - "agent-coordinator/src/locks.py"
        - "agent-coordinator/src/work_queue.py"
        - "agent-coordinator/src/telemetry.py"

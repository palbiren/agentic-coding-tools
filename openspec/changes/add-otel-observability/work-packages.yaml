  # === LEAF: Integration ===
  - package_id: wp-integration
    title: "Integration testing and CI validation"
    task_type: verify
    description: |
      Merge all instrumented services and validate end-to-end.
      1. Merge worktrees from all implementation packages
      2. Run full test suite with OTel disabled (no-op) — verify no regressions
      3. Run full test suite with OTel enabled (in-memory exporter) — verify metrics flow
      4. Test /metrics Prometheus endpoint returns expected metric families
      5. Run mypy --strict and ruff check on all modified files
      6. Update CI workflow to include [observability] extras
    role: integration
    priority: 8
    depends_on:
      - wp-lock-metrics
      - wp-queue-metrics
      - wp-policy-metrics
    locks:
      files:
        - ".github/workflows/ci.yml"
      keys:
        - "feature:add-otel-observability:integration"
      ttl_minutes: 120
      reason: "Integration testing and CI update"
    scope:
      write_allow:
        - "agent-coordinator/tests/**"
        - ".github/workflows/ci.yml"
      read_allow:
        - "agent-coordinator/**"
        - "openspec/changes/add-otel-observability/**"
      deny: []
    worktree:
      name: add-otel-observability.wp-integration
      mode: isolated
    timeout_minutes: 90
    retry_budget: 1
    min_trust_level: 2
    verification:
      tier_required: A
      steps:
        - name: full-test-suite-noop
          kind: command
          command: "agent-coordinator/.venv/bin/python -m pytest agent-coordinator/tests/ -m 'not e2e and not integration' -v"
          cwd: "agent-coordinator"
          env:
            OTEL_METRICS_ENABLED: "false"
          evidence:
            artifacts: []
            result_keys:
              - "full_tests_noop_pass"
        - name: full-test-suite-enabled
          kind: command
          command: "agent-coordinator/.venv/bin/python -m pytest agent-coordinator/tests/ -m 'not e2e and not integration' -v"
          cwd: "agent-coordinator"
          env:
            OTEL_METRICS_ENABLED: "true"
          evidence:
            artifacts: []
            result_keys:

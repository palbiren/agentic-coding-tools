            provider: github
            workflow: ci.yml
            required_checks:
              - "lint"
              - "typecheck"
              - "test"
          evidence:
            artifacts:
              - ".github/workflows/ci.yml"
            result_keys:
              - "ci_green"
    outputs:
      result_keys:
        - "integration_validated"
        - "ci_updated"
      artifacts:
        - ".github/workflows/ci.yml"

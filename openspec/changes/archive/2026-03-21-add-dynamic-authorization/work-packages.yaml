            result_keys: ["mypy_api_clean"]
    outputs:
      result_keys: ["tests_passed", "test_count", "mypy_mcp_clean", "mypy_api_clean"]

  # ── Level 3: Integration testing and documentation ───────────────
  - package_id: wp-integration
    title: "Full integration testing and documentation"
    task_type: integration
    description: >
      Merge all worktree branches into the feature branch.
      Run full test suite: pytest, mypy --strict, ruff.
      Verify backward compatibility: all existing tests pass with features disabled.
      Update agent-coordinator/README.md with new features, environment variables.
      Update default Cedar policies with delegation, risk, and approval conditions.
      Run openspec validate add-dynamic-authorization --strict.
    role: integration-engineer
    priority: 4
    depends_on:
      - wp-policy-engine
      - wp-transport
    locks:
      files: []
      keys:
        - "feature:add-dynamic-authorization:integration"
      ttl_minutes: 120
      reason: "Integration testing and documentation"
    scope:
      write_allow:
        - "agent-coordinator/**"
      read_allow:
        - "**"
      deny: []
    worktree:
      name: add-dynamic-authorization.wp-integration
      mode: shared
    timeout_minutes: 120
    retry_budget: 2
    min_trust_level: 3
    verification:
      tier_required: A
      steps:
        - name: "Full test suite"
          kind: command
          command: "cd agent-coordinator && .venv/bin/python -m pytest tests/ -v -m 'not e2e and not integration'"
          evidence:
            artifacts: []
            result_keys: ["all_tests_passed", "total_test_count"]
        - name: "Type checking"
          kind: command
          command: "cd agent-coordinator && .venv/bin/python -m mypy src/ --strict"
          evidence:
            artifacts: []
            result_keys: ["mypy_all_clean"]
        - name: "Linting"
          kind: command
          command: "cd agent-coordinator && .venv/bin/python -m ruff check src/ tests/"
          evidence:
            artifacts: []
            result_keys: ["ruff_clean"]
    outputs:
      result_keys: ["all_tests_passed", "total_test_count", "mypy_all_clean", "ruff_clean"]

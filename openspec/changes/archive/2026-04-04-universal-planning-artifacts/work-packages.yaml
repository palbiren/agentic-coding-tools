# Work Packages: Universal Planning Artifacts
# Change ID: universal-planning-artifacts
# Tier: local-parallel
# Pattern: single package — this feature modifies skill definitions (SKILL.md)
#   and specs, not application code with parallelizable boundaries.

packages:
  - id: wp-main
    name: "Universal planning artifacts — skill definitions and specs"
    description: >
      Update plan-feature, implement-feature, parallel-review-implementation,
      and merge-pull-requests skill definitions to always generate and consume
      contracts and work-packages. Update CLAUDE.md and specs.
    tasks: ["1.1", "1.2", "1.3", "1.4", "1.5", "1.6", "2.1", "2.2", "2.3", "2.4", "3.1", "3.2", "3.3"]
    priority: 1
    dependencies: []
    scope:
      write_allow:
        - "skills/plan-feature/SKILL.md"
        - "skills/parallel-review-implementation/SKILL.md"
        - "skills/implement-feature/SKILL.md"
        - "skills/merge-pull-requests/SKILL.md"
        - "CLAUDE.md"
        - "openspec/specs/skill-workflow/**"
        - "openspec/specs/merge-pull-requests/**"
        - "openspec/changes/universal-planning-artifacts/**"
      read_allow:
        - "**"
    verification: tier_b
    agent_hint: >
      This is a documentation/skill-definition change. Edit the canonical SKILL.md files
      in skills/ (not .claude/skills/). Key changes: (1) Remove [local-parallel+] tier gates
      from plan-feature Steps 7-8, add sequential guidance for single wp-main package.
      (2) Add whole-branch review fallback to parallel-review-implementation Step 1.
      (3) Make implement-feature Step 3a always read contracts. (4) Update CLAUDE.md tier table.
      Run skills/install.sh after edits to sync runtime copies.

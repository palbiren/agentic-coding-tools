# Internal API Contract: Parallel Runner
# These are Python function signatures — not HTTP APIs.
# Contracts define the interface between work packages.

parallel_runner:
  path: skills/bug-scrub/scripts/parallel_runner.py
  functions:
    - name: run_collectors_parallel
      signature: |
        def run_collectors_parallel(
            collectors: dict[str, Callable[[str], SourceResult]],
            project_dir: str,
            max_workers: int = 8,
            timeout_per_collector: int = 300,
        ) -> list[SourceResult]
      description: >
        Run signal collectors concurrently via ThreadPoolExecutor.
        Returns results in submission order. Failed collectors return
        SourceResult(status="error") instead of raising.
      inputs:
        - collectors: dict mapping source name to collector function
        - project_dir: absolute path to project root
        - max_workers: max concurrent threads (default 8)
        - timeout_per_collector: per-collector timeout in seconds
      outputs:
        - list[SourceResult] in same order as collectors dict

parallel_auto:
  path: skills/fix-scrub/scripts/parallel_auto.py
  functions:
    - name: execute_auto_fixes_parallel
      signature: |
        def execute_auto_fixes_parallel(
            auto_groups: list[FixGroup],
            project_dir: str,
            max_workers: int = 4,
        ) -> tuple[list[ClassifiedFinding], list[ClassifiedFinding]]
      description: >
        Run ruff --fix on non-overlapping file groups concurrently.
        Returns (resolved, persisting) findings.
      inputs:
        - auto_groups: file-grouped classified findings
        - project_dir: project root
        - max_workers: max concurrent threads
      outputs:
        - tuple of (resolved_findings, persisting_findings)

parallel_verify:
  path: skills/fix-scrub/scripts/parallel_verify.py
  functions:
    - name: verify_parallel
      signature: |
        def verify_parallel(
            project_dir: str,
            original_failures: dict[str, set[str]] | None = None,
        ) -> VerificationResult
      description: >
        Run quality checks (pytest, mypy, ruff, openspec) concurrently.
        Returns unified VerificationResult. Matches existing verify()
        signature including original_failures type for regression detection.

vendor_dispatch:
  path: skills/fix-scrub/scripts/vendor_dispatch.py
  functions:
    - name: route_prompts_to_vendors
      signature: |
        def route_prompts_to_vendors(
            agent_prompts: list[tuple[str, str]],
            available_vendors: list[str],
        ) -> dict[str, list[dict[str, str]]]
      description: >
        Route agent-fix prompts to vendors per file-group using
        round-robin distribution. Maintains exclusive file ownership —
        each file-group goes to exactly one vendor.
        Returns dict mapping vendor name to list of {"file": str, "prompt": str}.
      inputs:
        - agent_prompts: list of (file_path, prompt_text) tuples from generate_prompts()
        - available_vendors: list of vendor names to distribute across
      outputs:
        - dict[vendor_name, list[{"file": str, "prompt": str}]]

    - name: discover_vendors
      signature: |
        def discover_vendors(
            requested_vendors: list[str] | None = None,
        ) -> list[str]
      description: >
        Discover available vendors via ReviewOrchestrator.from_coordinator()
        with fallback to from_agents_yaml(). If requested_vendors is provided,
        filter to only those vendors. Emits warning for unavailable vendors.

name: feature-workflow
version: 1
description: >
  Full-lifecycle feature development workflow with exploration, structured iteration,
  deployment validation, and deferred task tracking. Extends the default spec-driven
  schema with artifacts for each stage of the plan-implement-validate-cleanup cycle.

artifacts:
  # Pre-planning: investigation and context gathering
  - id: exploration
    generates: exploration.md
    template: exploration.md
    description: Investigate the problem space, gather codebase context, identify constraints
    instruction: >
      Research the feature area by examining existing specs, active changes, architecture
      artifacts, and related code. Produce a structured context synthesis — not free-form
      notes. Include related specs, active changes, architecture context, integration points,
      and a clear recommendation on whether to proceed to a proposal.
    requires: []

  # Core planning artifacts (compatible with spec-driven defaults)
  - id: proposal
    generates: proposal.md
    template: proposal.md
    description: Define why the change is needed, explore approaches, and describe what changes
    instruction: >
      Write a proposal with Why (1-2 sentences on problem/opportunity), What Changes
      (bullet list, mark breaking changes with **BREAKING**), Approaches Considered
      (2-3 distinct approaches with pros/cons/effort, one marked as Recommended; 3-5
      in --explore mode), and Impact (affected specs and code). The Approaches Considered
      section is mandatory. After the user selects an approach at Gate 1, add a Selected
      Approach subsection recording the choice and any modifications requested. Use a
      verb-led kebab-case change-id.
    requires: []

  - id: specs
    generates: specs/**/*.md
    template: spec.md
    description: Delta specifications for affected capabilities
    instruction: >
      Create spec delta files under specs/<capability>/spec.md using ADDED/MODIFIED/REMOVED
      sections. Every requirement uses SHALL/MUST and has at least one #### Scenario: with
      WHEN/THEN/AND clauses. One file per affected capability.
    requires: [proposal]

  - id: design
    generates: design.md
    template: design.md
    description: Technical decisions, alternatives, risks, and migration plan
    instruction: >
      Only create if the change is cross-cutting, introduces new patterns, or has
      security/performance/migration complexity. Include Context, Goals/Non-Goals,
      Decisions with alternatives considered, Risks/Trade-offs, and Migration Plan.
    requires: [proposal]

  - id: tasks
    generates: tasks.md
    template: tasks.md
    description: Ordered implementation checklist with dependencies and file scopes
    instruction: >
      Create single-commit-sized, atomic, testable tasks. Each task declares explicit
      file scope (Files: list) for parallel execution safety. Tasks with overlapping
      files have explicit Dependencies annotations. Group to maximize parallel width.
      Every task traces to a requirement; every requirement to a task.
    requires: [specs]

  # Parallel workflow: contract-first development and work-package decomposition
  - id: contracts
    generates: contracts/**/*
    template: contracts.md
    description: Machine-readable interface definitions for contract-first multi-agent development
    instruction: >
      Generate contract artifacts in a contracts/ directory. The primary artifact is an
      OpenAPI spec (contracts/openapi/v1.yaml) defining all API endpoints. Generate
      language-specific types from the spec: Pydantic models (contracts/generated/python/),
      TypeScript interfaces (contracts/generated/typescript/). Add SQL schema definitions
      for new tables (contracts/sql/), event schemas as JSON Schema (contracts/events/),
      and Prism mock config (contracts/mocks/). All contracts are frozen per revision
      during work-package execution.
    requires: [proposal, specs]

  - id: work-packages
    generates: work-packages.yaml
    template: work-packages.yaml
    description: Versioned execution contract for DAG-scheduled multi-agent implementation
    instruction: >
      Decompose tasks into agent-scoped work packages in work-packages.yaml. Each package
      declares: package_id, task_type, description, depends_on (DAG edges), priority,
      locks (files + logical keys), scope (write_allow/read_allow/deny globs), worktree
      config, verification steps, and outputs. Validate against
      openspec/schemas/work-packages.schema.json. Ensure parallel packages have
      non-overlapping write_allow scopes and non-overlapping lock keys. Include a
      wp-integration package that merges all worktrees and runs the full test suite.
    requires: [contracts, tasks]

  # Iteration artifacts: produced during refinement loops
  - id: plan-findings
    generates: plan-findings.md
    template: plan-findings.md
    description: Structured quality findings from plan iteration cycles
    instruction: >
      Append an iteration section with a findings table (columns: #, Type, Criticality,
      Description, Resolution). Types: completeness, clarity, feasibility, scope,
      consistency, testability, parallelizability, assumptions. Include a parallelizability
      assessment with independent task count, sequential chains, and max parallel width.
      Assumption-type findings that could reasonably go either way (e.g., authentication
      mechanism, data format, deployment target, backward-compatibility) MUST be surfaced
      to the user via AskUserQuestion rather than resolved autonomously.
    requires: [proposal, tasks]

  - id: impl-findings
    generates: impl-findings.md
    template: impl-findings.md
    description: Structured improvement findings from implementation iteration cycles
    instruction: >
      Append an iteration section with a findings table (columns: #, Type, Criticality,
      Description, Resolution). Types: bug, edge-case, workflow, performance, UX.
      Include quality check results (pytest, mypy, ruff, openspec validate) and note
      any spec drift detected.
    requires: [tasks]

  # Post-implementation artifacts
  - id: architecture-impact
    generates: architecture-impact.md
    template: architecture-impact.md
    description: Architectural impact analysis comparing the change to the base branch
    instruction: >
      Run make architecture-diff BASE_SHA=<merge-base-sha> and make architecture-validate
      against the changed files. Report new/broken cross-layer flows, affected parallel
      zones, new high-impact nodes, new cycles, and untested routes. Include the output
      of validate_flows.py scoped to changed files. This artifact captures the structural
      consequences of the implementation on the project architecture.
    requires: [tasks]

  - id: security-review-report
    generates: security-review-report.md
    template: security-review-report.md
    description: Security gate report produced by /security-review before validation
    instruction: >
      Run the security-review workflow (profile detection, scanner matrix execution,
      normalized finding aggregation, and gate decision). Record scanner statuses,
      severity summary, threshold policy, PASS/FAIL/INCONCLUSIVE result, and required
      remediation. If prerequisites are missing, include exact installation commands or
      bootstrap results and mark the decision INCONCLUSIVE unless policy allows degraded pass.
    requires: [tasks]

  - id: validation-report
    generates: validation-report.md
    template: validation-report.md
    description: Deployment validation results across all test phases
    instruction: >
      Run validation phases (Deploy, Smoke, E2E, Architecture, Spec Compliance, Logs,
      CI/CD) and record per-phase pass/fail/warn/skip results. Include commit SHA,
      branch, timestamp, per-scenario spec compliance, and overall PASS/FAIL determination.
      Spec compliance details are in change-context.md; include only a summary count here.
    requires: [tasks]

  - id: change-context
    generates: change-context.md
    template: change-context.md
    description: Structured traceability matrix mapping requirements to code, tests, and evidence
    instruction: >
      Phase 1 (pre-implementation): Populate Req ID, Spec Source, Description, and planned
      Test(s) from specs/ scenarios. Files Changed = "---". Write failing tests (RED).
      Phase 2 (implementation): Update Files Changed column after code is written. Tests
      should now pass (GREEN). Phase 3 (validation): Fill Evidence column with "pass <SHA>"
      or "fail <SHA>" or "deferred <reason>". Design Decision Trace from design.md if present.
      For parallel workflow, synthesize Review Findings Summary from review-findings.json.
      Populate Coverage Summary with exact counts.
    requires: [specs, tasks]

  - id: deferred-tasks
    generates: deferred-tasks.md
    template: deferred-tasks.md
    description: Open tasks migrated to follow-up proposals or issue trackers
    instruction: >
      List each unchecked task from tasks.md with its original context, file scope,
      dependencies, migration target (Beads issue or follow-up proposal), and reason
      for deferral. Preserve traceability to the original change-id.
    requires: [tasks]

  # Validation-phase artifact: rework routing
  - id: rework-report
    generates: rework-report.json
    description: Machine-readable rework report mapping failed scenarios to owners and actions
    instruction: >
      Generated by /validate-feature when scenario-based validation is executed. Maps failed
      scenario IDs to visibility (public/holdout), requirement refs, implicated files, likely
      owners, and recommended next actions (iterate, revise-spec, defer, block-cleanup, none).
      Consumed by /iterate-on-implementation as primary rework input and by /cleanup-feature
      and /merge-pull-requests for holdout gate checks.
    requires: [validation-report]
    optional: true

  # Validation-phase artifact: convergence analysis
  - id: process-analysis
    generates: process-analysis.md
    template: process-analysis.md
    description: Convergence behavior summary (loops, churn, flakiness, outcomes)
    instruction: >
      Generated by /validate-feature summarizing convergence behavior: validation loops taken,
      repeated findings, flaky scenarios, time to first pass, file churn, and resolved vs
      deferred finding counts. Also produced as process-analysis.json for machine consumption.
      Cleanup and merge gates consume read-only. Archive mining uses it for process outcomes.
    requires: [validation-report]
    optional: true

  # Cleanup-phase artifact: conversation context preservation
  - id: session-log
    generates: session-log.md
    template: session-log.md
    description: Sanitized summary of agent session history capturing decision rationale
    instruction: >
      Generate a structured summary of the agent conversation capturing key decisions,
      alternatives considered, trade-offs accepted, and open questions. Extract from
      agent session transcript (preferred), handoff document history (fallback), or
      agent self-summary (last resort). Sanitize all content to remove secrets, API keys,
      tokens, and sensitive paths before committing. Focus on the "why" behind decisions,
      not code diffs. Limit to 500 lines.
    requires: [tasks]
    optional: true

apply:
  requires: [proposal, specs, tasks]
  tracks: tasks.md
